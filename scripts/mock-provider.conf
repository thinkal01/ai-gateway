server {
    listen 80;
    server_name localhost;

    location /mock/chat/completions {
        add_header Content-Type application/json;
        return 200 '{
            "id": "mock-chatcmpl-123",
            "object": "chat.completion",
            "created": 1677652288,
            "model": "gpt-4",
            "choices": [
                {
                    "index": 0,
                    "message": {
                        "role": "assistant",
                        "content": "Mock response from ai-gateway"
                    },
                    "finish_reason": "stop"
                }
            ],
            "usage": {
                "prompt_tokens": 10,
                "completion_tokens": 10,
                "total_tokens": 20
            }
        }';
    }

    location /mock/models {
        add_header Content-Type application/json;
        return 200 '{
            "object": "list",
            "data": [
                {"id": "gpt-4", "object": "model"},
                {"id": "gpt-4-turbo", "object": "model"},
                {"id": "gpt-3.5-turbo", "object": "model"}
            ]
        }';
    }

    location /mock/ {
        return 404 "{\"error\": {\"message\": \"Not found\", \"type\": \"not_found\", \"code\": 404}}";
    }
}